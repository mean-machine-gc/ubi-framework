<!DOCTYPE html>
<html lang="{{ .Lang }}" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Serif:ital,wght@0,600;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  {{ $style := resources.Get "css/main.css" }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">
  <script>
    (function() {
      var s = localStorage.getItem('theme');
      if (s) document.documentElement.setAttribute('data-theme', s);
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <nav class="nav-container">
      <a href="{{ .Site.BaseURL }}" class="site-title">ubi.</a>
      <div class="nav-right">
        <div class="nav-links">
          {{ range .Site.Menus.main }}
            <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
          {{ end }}
        </div>
        <button class="theme-toggle" aria-label="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="128" cy="128" r="92" stroke="currentColor" stroke-width="12"/>
            <path class="icon-half" d="M128 36v184a92 92 0 0 1 0-184z" fill="currentColor"/>
          </svg>
        </button>
        <button class="burger" aria-label="Menu">
          <svg class="burger-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
          <svg class="burger-close" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <line x1="4" y1="4" x2="20" y2="20"/>
            <line x1="20" y1="4" x2="4" y2="20"/>
          </svg>
        </button>
      </div>
    </nav>
    <nav class="mobile-menu">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="mobile-menu-link">{{ .Name }}</a>
      {{ end }}
    </nav>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <p>&copy; {{ now.Year }} {{ .Site.Params.author }}. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.querySelector('.theme-toggle').addEventListener('click', function() {
      var h = document.documentElement, next = h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      h.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // Burger menu
    var burger = document.querySelector('.burger');
    var mobileMenu = document.querySelector('.mobile-menu');
    if (burger && mobileMenu) {
      burger.addEventListener('click', function() {
        var isOpen = mobileMenu.classList.toggle('open');
        burger.querySelector('.burger-open').style.display = isOpen ? 'none' : 'block';
        burger.querySelector('.burger-close').style.display = isOpen ? 'block' : 'none';
      });
    }

    // Figure zoom
    document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.prose figure, .prose .figure').forEach(function(fig) {
      var icon = document.createElement('div');
      icon.className = 'figure-zoom';
      icon.innerHTML = '<svg class="zoom-in" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="7" y1="10" x2="13" y2="10"/><line x1="10" y1="7" x2="10" y2="13"/></svg>'
        + '<svg class="zoom-out" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="7" y1="10" x2="13" y2="10"/></svg>';
      fig.appendChild(icon);
      fig.addEventListener('click', function() {
        fig.classList.toggle('expanded');
      });
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.querySelectorAll('.figure.expanded, figure.expanded').forEach(function(f) {
          f.classList.remove('expanded');
        });
      }
    });
    });
  </script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    mermaid.initialize({
      startOnLoad: true,
      theme: 'base',
      themeVariables: {
        background: 'transparent',
        primaryColor: isDark ? '#0d1928' : 'rgba(26, 111, 160, 0.08)',
        primaryBorderColor: isDark ? '#3a7aad' : '#2e86c1',
        primaryTextColor: isDark ? '#d4dce8' : '#0c1222',
        secondaryColor: isDark ? '#132035' : 'rgba(26, 111, 160, 0.15)',
        secondaryBorderColor: isDark ? '#2a5580' : '#5dade2',
        secondaryTextColor: isDark ? '#8a9ab0' : '#1a3a5c',
        tertiaryColor: isDark ? '#0f1724' : 'rgba(26, 111, 160, 0.04)',
        tertiaryBorderColor: isDark ? '#1c2940' : '#2e86c1',
        lineColor: isDark ? '#3a7aad' : '#2e86c1',
        textColor: isDark ? '#d4dce8' : '#111111',
        fontSize: '13px',
        fontFamily: 'IBM Plex Sans, sans-serif',
        nodeTextColor: isDark ? '#d4dce8' : '#0c1222',
        edgeLabelBackground: 'transparent',
        clusterBkg: 'transparent',
        clusterBorder: isDark ? '#1c2940' : '#5dade2',
      },
      flowchart: {
        curve: 'basis',
        padding: 16,
        nodeSpacing: 40,
        rankSpacing: 60,
        htmlLabels: true,
      }
    });
  </script>
</body>
</html>
